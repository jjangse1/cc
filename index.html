<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>척 · 츄</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;width:100vw;height:100dvh;overflow:hidden;font-family:'Black Han Sans',sans-serif}
  #video{position:fixed;top:0;left:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);opacity:0.9}
  .word{position:fixed;left:50%;top:45%;transform:translate(-50%,-50%) scale(0.3);font-size:clamp(130px,35vw,300px);opacity:0;pointer-events:none;z-index:50;text-shadow:0 0 60px currentColor,6px 6px 0 rgba(0,0,0,0.9)}
  .word.pop{animation:popAnim 1s cubic-bezier(0.175,0.885,0.32,1.275) forwards}
  #wL{color:#00d4ff}#wR{color:#ff3d7f}
  @keyframes popAnim{
    0%  {opacity:0;transform:translate(-50%,-50%) scale(0.2) rotate(-10deg);filter:blur(12px)}
    45% {opacity:1;transform:translate(-50%,-50%) scale(1.2) rotate(3deg);filter:blur(0)}
    65% {transform:translate(-50%,-50%) scale(0.92) rotate(-1deg)}
    80% {opacity:1;transform:translate(-50%,-50%) scale(1.0)}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1.5) rotate(6deg);filter:blur(10px)}
  }
  #flash{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:40;mix-blend-mode:screen}
  .dot{position:fixed;width:18px;height:18px;border-radius:50%;top:24px;z-index:100;opacity:0.3;transition:opacity .1s,transform .15s}
  #dL{left:24px;background:#00d4ff;box-shadow:0 0 14px #00d4ff}
  #dR{right:24px;background:#ff3d7f;box-shadow:0 0 14px #ff3d7f}
  .dot.on{opacity:1;transform:scale(2.2)}
  #status{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.3);font-size:11px;letter-spacing:3px;font-family:monospace;z-index:100;white-space:nowrap}
  #ss{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:200}
  #ss h1{font-size:clamp(72px,22vw,130px);background:linear-gradient(135deg,#00d4ff,#ff3d7f);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .sub{color:rgba(255,255,255,0.4);font-size:12px;letter-spacing:5px;font-family:monospace}
  .hints{display:flex;gap:52px}
  .hint{display:flex;flex-direction:column;align-items:center;gap:8px}
  .hint .lbl{color:rgba(255,255,255,0.3);font-size:9px;letter-spacing:3px;font-family:monospace}
  .hint .kw{font-size:24px}
  .lh .kw{color:#00d4ff}.rh .kw{color:#ff3d7f}
  #prog{width:240px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;display:none}
  #pfill{height:100%;width:0%;background:linear-gradient(90deg,#00d4ff,#ff3d7f);transition:width .4s}
  #pmsg{color:rgba(255,255,255,0.35);font-size:11px;letter-spacing:2px;font-family:monospace;display:none;text-align:center;max-width:300px;line-height:2}
  #btn{margin-top:8px;padding:16px 50px;border:1.5px solid rgba(255,255,255,0.2);background:transparent;color:#fff;font-size:14px;letter-spacing:5px;font-family:monospace;cursor:pointer;border-radius:2px}
  #btn:active{background:rgba(255,255,255,0.07)}
</style>
</head>
<body>

<video id="video" autoplay muted playsinline></video>

<div id="flash"></div>
<div id="wL" class="word">척</div>
<div id="wR" class="word">츄</div>
<div class="dot" id="dL"></div>
<div class="dot" id="dR"></div>
<div id="status"></div>

<div id="ss">
  <h1>척 · 츄</h1>
  <div class="sub">EYE BLINK DETECTOR</div>
  <div class="hints">
    <div class="hint lh"><span style="font-size:30px">👁️</span><span class="lbl">LEFT</span><span class="kw">척</span></div>
    <div class="hint rh"><span style="font-size:30px">👁️</span><span class="lbl">RIGHT</span><span class="kw">츄</span></div>
  </div>
  <div id="prog"><div id="pfill"></div></div>
  <div id="pmsg"></div>
  <button id="btn" onclick="go()">START →</button>
</div>

<script>
const video = document.getElementById('video');
const flash = document.getElementById('flash');
const dL    = document.getElementById('dL');
const dR    = document.getElementById('dR');
const wL    = document.getElementById('wL');
const wR    = document.getElementById('wR');
const st    = document.getElementById('status');
const prog  = document.getElementById('prog');
const pfill = document.getElementById('pfill');
const pmsg  = document.getElementById('pmsg');

function setP(pct, msg){ prog.style.display='block'; pmsg.style.display='block'; pfill.style.width=pct+'%'; pmsg.textContent=msg; }
function pop(el,color){ el.classList.remove('pop'); void el.offsetWidth; el.classList.add('pop'); flash.style.background=color; flash.style.opacity='0.2'; setTimeout(()=>flash.style.opacity='0',120); }
function loadScript(src){ return new Promise((res,rej)=>{ const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=()=>rej(new Error('Load failed: '+src)); document.head.appendChild(s); }); }

// EAR — MediaPipe 468pt indices
const L_IDX=[362,385,387,263,373,380];
const R_IDX=[33,160,158,133,153,144];
function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2)}
function ear(kps,idx){const p=idx.map(i=>kps[i]);return(dist(p[1],p[5])+dist(p[2],p[4]))/(2*dist(p[0],p[3])+1e-6)}

const EAR_TH=0.18, MIN_F=2;
let lF=0,rF=0,lOpen=true,rOpen=true,detector=null,running=false;

async function loop(){
  if(!running) return;
  try{
    const faces=await detector.estimateFaces(video,{flipHorizontal:false});
    if(faces.length>0){
      st.textContent='👁  BLINK!';
      const kps=faces[0].keypoints;
      const lC=ear(kps,L_IDX)<EAR_TH;
      const rC=ear(kps,R_IDX)<EAR_TH;
      dL.className='dot'+(lC?' on':'');
      dR.className='dot'+(rC?' on':'');
      if(lC)lF++; else{if(lF>=MIN_F&&lOpen)pop(wL,'#00d4ff');lF=0;} lOpen=!lC;
      if(rC)rF++; else{if(rF>=MIN_F&&rOpen)pop(wR,'#ff3d7f');rF=0;} rOpen=!rC;
    }else{
      st.textContent='NO FACE — 얼굴을 가운데로';
      dL.className='dot'; dR.className='dot';
    }
  }catch(e){console.warn(e)}
  setTimeout(loop,80);
}

async function go(){
  document.getElementById('btn').style.display='none';
  setP(5,'CAMERA...');
  try{
    // 카메라
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:false});
    video.srcObject=stream;
    await new Promise(r=>{ video.onloadedmetadata=r; });
    video.play();
    setP(20,'TensorFlow.js 로딩 중...');

    // TF.js 통합 번들 (tf-core + webgl + converter 포함)
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js');
    await tf.setBackend('webgl');
    await tf.ready();
    setP(55,'Face Model 로딩 중...');

    // face-landmarks-detection
    await loadScript('https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@1.0.5/dist/face-landmarks-detection.min.js');
    setP(75,'Detector 생성 중...');

    detector=await faceLandmarksDetection.createDetector(
      faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh,
      { runtime:'tfjs', refineLandmarks:false, maxFaces:1 }
    );

    setP(100,'✓ 준비 완료!');
    await new Promise(r=>setTimeout(r,400));
    document.getElementById('ss').style.display='none';
    st.textContent='DETECTING...';
    running=true;
    loop();

  }catch(e){
    setP(0,'❌ '+e.message);
    document.getElementById('btn').style.display='block';
    console.error(e);
  }
}
</script>

</body>
</html>
