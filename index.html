<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>척 · 츄! </title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;width:100vw;height:100dvh;overflow:hidden;font-family:'Black Han Sans',sans-serif}

  #video{
    position:fixed;top:0;left:0;width:100%;height:100%;
    object-fit:cover;transform:scaleX(-1);opacity:0.85;
  }
  #canvas{
    position:fixed;top:0;left:0;width:100%;height:100%;
    transform:scaleX(-1);pointer-events:none;z-index:10;
  }

  .word{
    position:fixed;left:50%;top:42%;
    transform:translate(-50%,-50%) scale(0.3);
    font-size:clamp(140px,38vw,320px);
    opacity:0;pointer-events:none;z-index:50;
    text-shadow:0 0 80px currentColor,8px 8px 0 rgba(0,0,0,0.9);
  }
  .word.pop{animation:popAnim 1.1s cubic-bezier(0.175,0.885,0.32,1.275) forwards}
  #wFist{color:#ff3d7f}   /* 척 - 주먹 */
  #wOpen{color:#00d4ff}   /* 츄 - 손펴기 */

  @keyframes popAnim{
    0%  {opacity:0;transform:translate(-50%,-50%) scale(0.15) rotate(-12deg);filter:blur(16px)}
    40% {opacity:1;transform:translate(-50%,-50%) scale(1.25) rotate(4deg);filter:blur(0)}
    60% {transform:translate(-50%,-50%) scale(0.9) rotate(-2deg)}
    78% {opacity:1;transform:translate(-50%,-50%) scale(1.05)}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1.6) rotate(8deg);filter:blur(12px)}
  }

  #flash{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:40;mix-blend-mode:screen;transition:opacity 0.05s}

  /* gesture indicator */
  #gesture{
    position:fixed;bottom:36px;left:50%;transform:translateX(-50%);
    font-family:monospace;font-size:12px;letter-spacing:3px;
    color:rgba(255,255,255,0.35);z-index:100;white-space:nowrap;
    transition:color 0.2s;
  }
  #gesture.fist{color:#ff3d7f}
  #gesture.open{color:#00d4ff}

  /* start screen */
  #ss{
    position:fixed;inset:0;background:#000;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;z-index:200;
  }
  #ss h1{
    font-size:clamp(72px,22vw,140px);
    background:linear-gradient(135deg,#ff3d7f,#00d4ff);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .sub{color:rgba(255,255,255,0.4);font-size:12px;letter-spacing:5px;font-family:monospace}
  .hints{display:flex;gap:56px}
  .hint{display:flex;flex-direction:column;align-items:center;gap:10px}
  .hint .ico{font-size:36px}
  .hint .lbl{color:rgba(255,255,255,0.3);font-size:9px;letter-spacing:3px;font-family:monospace}
  .hint .kw{font-size:26px}
  .fh .kw{color:#ff3d7f}
  .oh .kw{color:#00d4ff}

  #prog{width:260px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;display:none}
  #pfill{height:100%;width:0%;background:linear-gradient(90deg,#ff3d7f,#00d4ff);transition:width .4s}
  #pmsg{color:rgba(255,255,255,0.35);font-size:11px;letter-spacing:2px;font-family:monospace;display:none;text-align:center;max-width:320px;line-height:2.2}

  #btn{
    margin-top:8px;padding:16px 54px;
    border:1.5px solid rgba(255,255,255,0.2);background:transparent;
    color:#fff;font-size:14px;letter-spacing:5px;font-family:monospace;
    cursor:pointer;border-radius:2px;
  }
  #btn:hover{background:rgba(255,255,255,0.06)}
</style>
</head>
<body>

<video id="video" autoplay muted playsinline></video>
<canvas id="canvas"></canvas>
<div id="flash"></div>
<div id="wFist" class="word">척</div>
<div id="wOpen" class="word">츄</div>
<div id="gesture">READY</div>

<div id="ss">
  <h1>척 · 츄</h1>
  <div class="sub">HAND GESTURE DETECTOR</div>
  <div class="hints">
    <div class="hint fh">
      <span class="ico">✊</span>
      <span class="lbl">FIST</span>
      <span class="kw">척</span>
    </div>
    <div class="hint oh">
      <span class="ico">🖐️</span>
      <span class="lbl">OPEN</span>
      <span class="kw">츄</span>
    </div>
  </div>
  <div id="prog"><div id="pfill"></div></div>
  <div id="pmsg"></div>
  <button id="btn" onclick="go()">START →</button>
</div>

<!-- MediaPipe Hands — official Google CDN (stable, no model file issues) -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js" crossorigin="anonymous"></script>

<script>
const video   = document.getElementById('video');
const canvas  = document.getElementById('canvas');
const flash   = document.getElementById('flash');
const wFist   = document.getElementById('wFist');
const wOpen   = document.getElementById('wOpen');
const gestEl  = document.getElementById('gesture');
const pfill   = document.getElementById('pfill');
const pmsg    = document.getElementById('pmsg');
const ctx     = canvas.getContext('2d');

function setP(pct, msg){
  document.getElementById('prog').style.display='block';
  pmsg.style.display='block';
  pfill.style.width=pct+'%';
  pmsg.textContent=msg;
}

function pop(el, color){
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  flash.style.background = color;
  flash.style.opacity = '0.25';
  setTimeout(()=>flash.style.opacity='0', 130);
}

// ── Gesture classification ────────────────────────────────
// MediaPipe Hands 21 landmarks
// Finger tip indices: thumb=4, index=8, middle=12, ring=16, pinky=20
// Finger pip indices: thumb=3, index=6, middle=10, ring=14, pinky=18
// Finger mcp indices: index=5, middle=9, ring=13, pinky=17

const TIPS = [4, 8, 12, 16, 20];
const PIPS = [3, 6, 10, 14, 18];
const MCPS = [1, 5, 9, 13, 17];

function isFingerOpen(lm, tip, pip) {
  // Finger is open if tip is further from wrist than pip
  const wrist = lm[0];
  const tipDist  = Math.hypot(lm[tip].x - wrist.x, lm[tip].y - wrist.y);
  const pipDist  = Math.hypot(lm[pip].x - wrist.x, lm[pip].y - wrist.y);
  return tipDist > pipDist * 1.1;
}

function classifyHand(landmarks) {
  // Count open fingers (skip thumb for simplicity)
  let openCount = 0;
  for (let i = 1; i <= 4; i++) {
    if (isFingerOpen(landmarks, TIPS[i], PIPS[i])) openCount++;
  }
  // Thumb: check if tip is far from index MCP
  const thumbOpen = Math.hypot(
    landmarks[4].x - landmarks[5].x,
    landmarks[4].y - landmarks[5].y
  ) > Math.hypot(
    landmarks[3].x - landmarks[5].x,
    landmarks[3].y - landmarks[5].y
  );
  if (thumbOpen) openCount++;

  if (openCount >= 4) return 'open';   // 손펴기 → 츄
  if (openCount <= 1) return 'fist';   // 주먹   → 척
  return 'mid';
}

// State machine — trigger on TRANSITION
let prevGesture = 'mid';
let stableCount = 0;
const STABLE_TH = 3; // frames to confirm gesture

function onGesture(g) {
  if (g === prevGesture) {
    stableCount++;
    if (stableCount === STABLE_TH) {
      // Confirmed new gesture
      if (g === 'fist') {
        pop(wFist, '#ff3d7f');
        gestEl.textContent = '✊  척!';
        gestEl.className = 'fist';
      } else if (g === 'open') {
        pop(wOpen, '#00d4ff');
        gestEl.textContent = '🖐  츄!';
        gestEl.className = 'open';
      } else {
        gestEl.textContent = '...';
        gestEl.className = '';
      }
    }
  } else {
    prevGesture = g;
    stableCount = 0;
  }
}

// ── MediaPipe setup ───────────────────────────────────────
let handsModel = null;

function onResults(results) {
  // Resize canvas
  canvas.width  = video.videoWidth  || canvas.offsetWidth;
  canvas.height = video.videoHeight || canvas.offsetHeight;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
    const landmarks = results.multiHandLandmarks[0];

    // Draw hand skeleton
    drawConnectors(ctx, landmarks, HAND_CONNECTIONS, {color:'rgba(255,255,255,0.25)', lineWidth:2});
    drawLandmarks(ctx, landmarks, {color:'rgba(255,255,255,0.6)', lineWidth:1, radius:3});

    const g = classifyHand(landmarks);
    onGesture(g);
  } else {
    gestEl.textContent = 'NO HAND — 손을 화면에';
    gestEl.className = '';
    stableCount = 0;
  }
}

async function go() {
  document.getElementById('btn').style.display = 'none';
  setP(10, '카메라 초기화...');

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode:'user', width:{ideal:1280}, height:{ideal:720} },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(r => { video.onloadedmetadata = r; });
    video.play();

    setP(40, 'MediaPipe Hands 로딩 중...\n(첫 로딩 10~20초)');

    handsModel = new Hands({
      locateFile: file =>
        `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`
    });

    handsModel.setOptions({
      maxNumHands: 1,
      modelComplexity: 1,
      minDetectionConfidence: 0.6,
      minTrackingConfidence: 0.5,
    });

    handsModel.onResults(onResults);

    setP(70, '모델 초기화 중...');

    // Use Camera utility for proper frame feeding
    const camera = new Camera(video, {
      onFrame: async () => {
        await handsModel.send({ image: video });
      },
      width: 1280,
      height: 720,
    });

    await camera.start();

    setP(100, '✓ 준비 완료!');
    await new Promise(r => setTimeout(r, 400));
    document.getElementById('ss').style.display = 'none';
    gestEl.textContent = '손을 화면에 보여주세요';

  } catch(e) {
    setP(0, '❌ ' + e.message);
    document.getElementById('btn').style.display = 'block';
    console.error(e);
  }
}
</script>
</body>
</html>
