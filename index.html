<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>척 · 츄!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;width:100vw;height:100dvh;overflow:hidden;font-family:'Black Han Sans',sans-serif}

  #video{
    position:fixed;top:0;left:0;width:100%;height:100%;
    object-fit:cover;transform:scaleX(-1);opacity:0.85;
  }
  #canvas{
    position:fixed;top:0;left:0;width:100%;height:100%;
    transform:scaleX(-1);pointer-events:none;z-index:10;
  }

  /* ── 유튜브 미니 플레이어 ── */
  #yt-wrap{
    position:fixed;
    bottom:80px;right:16px;
    width:150px;height:85px;
    border-radius:12px;
    overflow:hidden;
    border:2px solid rgba(255,255,255,0.2);
    box-shadow:0 4px 30px rgba(0,0,0,0.8);
    z-index:200;
    cursor:pointer;
    display:none;
    transition:transform 0.2s,box-shadow 0.2s;
  }
  #yt-wrap:hover{transform:scale(1.06);box-shadow:0 8px 40px rgba(0,0,0,0.95)}
  #yt-wrap iframe{width:100%;height:100%;border:none;pointer-events:none;}

  /* 소리 안내 오버레이 */
  #yt-overlay{
    position:absolute;inset:0;
    background:rgba(0,0,0,0.6);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:5px;
    transition:opacity 0.3s;
    pointer-events:none;
  }
  #yt-overlay .yt-icon{font-size:24px}
  #yt-overlay .yt-txt{color:rgba(255,255,255,0.85);font-size:9px;letter-spacing:1px;font-family:monospace;text-align:center;line-height:1.7}
  #yt-wrap.unmuted #yt-overlay{opacity:0;}

  /* 재생중 뱃지 */
  #yt-wrap.unmuted::after{
    content:'♪ 재생중';
    position:absolute;top:5px;right:7px;
    color:rgba(255,255,255,0.8);font-size:9px;letter-spacing:1px;font-family:monospace;
    pointer-events:none;
    text-shadow:0 1px 4px #000;
  }

  .word{
    position:fixed;
    font-size:clamp(100px,28vw,240px);
    opacity:0;pointer-events:none;z-index:50;
    text-shadow:0 0 80px currentColor,8px 8px 0 rgba(0,0,0,0.9);
  }
  .word.pop{animation:popAnim 1.1s cubic-bezier(0.175,0.885,0.32,1.275) forwards}
  #wFist{color:#ff3d7f}
  #wOpen{color:#00d4ff}

  @keyframes popAnim{
    0%  {opacity:0;transform:translate(-50%,-50%) scale(0.15) rotate(-12deg);filter:blur(16px)}
    40% {opacity:1;transform:translate(-50%,-50%) scale(1.25) rotate(4deg);filter:blur(0)}
    60% {transform:translate(-50%,-50%) scale(0.9) rotate(-2deg)}
    78% {opacity:1;transform:translate(-50%,-50%) scale(1.05)}
    100%{opacity:0;transform:translate(-50%,-50%) scale(1.6) rotate(8deg);filter:blur(12px)}
  }

  #flash{position:fixed;inset:0;opacity:0;pointer-events:none;z-index:40;mix-blend-mode:screen;transition:opacity 0.05s}

  #gesture{
    position:fixed;bottom:36px;left:50%;transform:translateX(-50%);
    font-family:monospace;font-size:12px;letter-spacing:3px;
    color:rgba(255,255,255,0.35);z-index:100;white-space:nowrap;
    transition:color 0.2s;
  }
  #gesture.fist{color:#ff3d7f}
  #gesture.open{color:#00d4ff}

  /* start screen */
  #ss{
    position:fixed;inset:0;background:#000;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:22px;z-index:300;
  }
  #ss h1{
    font-size:clamp(72px,22vw,140px);
    background:linear-gradient(135deg,#ff3d7f,#00d4ff);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  }
  .sub{color:rgba(255,255,255,0.4);font-size:12px;letter-spacing:5px;font-family:monospace}
  .hints{display:flex;gap:56px}
  .hint{display:flex;flex-direction:column;align-items:center;gap:10px}
  .hint .ico{font-size:36px}
  .hint .lbl{color:rgba(255,255,255,0.3);font-size:9px;letter-spacing:3px;font-family:monospace}
  .hint .kw{font-size:26px}
  .fh .kw{color:#ff3d7f}
  .oh .kw{color:#00d4ff}

  #prog{width:260px;height:2px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;display:none}
  #pfill{height:100%;width:0%;background:linear-gradient(90deg,#ff3d7f,#00d4ff);transition:width .4s}
  #pmsg{color:rgba(255,255,255,0.35);font-size:11px;letter-spacing:2px;font-family:monospace;display:none;text-align:center;max-width:320px;line-height:2.2}

  #btn{
    margin-top:8px;padding:16px 54px;
    border:1.5px solid rgba(255,255,255,0.2);background:transparent;
    color:#fff;font-size:14px;letter-spacing:5px;font-family:monospace;
    cursor:pointer;border-radius:2px;
  }
  #btn:hover{background:rgba(255,255,255,0.06)}
</style>
</head>
<body>

<video id="video" autoplay muted playsinline></video>
<canvas id="canvas"></canvas>
<div id="flash"></div>
<div id="wFist" class="word">척</div>
<div id="wOpen" class="word">츄</div>
<div id="gesture">READY</div>

<!-- 오른쪽 아래 유튜브 미니 플레이어 -->
<div id="yt-wrap" onclick="unmuteYT()">
  <iframe
  id="yt-iframe"
  src="https://www.youtube.com/embed/NqQ5qUZeuwo?enablejsapi=1&autoplay=1&mute=1&playsinline=1"
  allow="autoplay; encrypted-media"
  allowfullscreen>
  </iframe>
  <div id="yt-overlay">
    <span class="yt-icon">🔇</span>
    <span class="yt-txt">여기 탭하면<br>소리 켜져요!</span>
  </div>
</div>

<div id="ss">
  <h1>척 · 츄</h1>
  <div class="sub">HAND GESTURE DETECTOR</div>
  <div class="hints">
    <div class="hint fh">
      <span class="ico">✊</span>
      <span class="lbl">FIST</span>
      <span class="kw">척</span>
    </div>
    <div class="hint oh">
      <span class="ico">🖐️</span>
      <span class="lbl">OPEN</span>
      <span class="kw">츄</span>
    </div>
  </div>
  <div id="prog"><div id="pfill"></div></div>
  <div id="pmsg"></div>
  <button id="btn" onclick="go()">START →</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1640029074/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js" crossorigin="anonymous"></script>

<script>
const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const flash  = document.getElementById('flash');
const wFist  = document.getElementById('wFist');
const wOpen  = document.getElementById('wOpen');
const gestEl = document.getElementById('gesture');
const pfill  = document.getElementById('pfill');
const pmsg   = document.getElementById('pmsg');
const ytWrap = document.getElementById('yt-wrap');
const ctx    = canvas.getContext('2d');

// ── YouTube IFrame API로 소리 제어 ─────────────────────
let ytPlayer = null;

window.onYouTubeIframeAPIReady = function() {
  ytPlayer = new YT.Player('yt-iframe', {
    events: {
      onReady: function(e) {
        console.log('YT ready');
      }
    }
  });
};

function unmuteYT() {
  if (ytPlayer && ytPlayer.unMute) {
    ytPlayer.unMute();
    ytPlayer.setVolume(85);
    ytPlayer.playVideo();
  }
  ytWrap.classList.add('unmuted');
}

// ── UI ──────────────────────────────────────────────────
function setP(pct, msg){
  document.getElementById('prog').style.display='block';
  pmsg.style.display='block';
  pfill.style.width=pct+'%';
  pmsg.textContent=msg;
}

function randomPos(el){
  el.style.left = (15 + Math.random()*70) + '%';
  el.style.top  = (15 + Math.random()*70) + '%';
}

function pop(el, color){
  randomPos(el);
  el.classList.remove('pop');
  void el.offsetWidth;
  el.classList.add('pop');
  flash.style.background = color;
  flash.style.opacity = '0.25';
  setTimeout(()=>flash.style.opacity='0', 130);
}

// ── Gesture ─────────────────────────────────────────────
const TIPS=[4,8,12,16,20], PIPS=[3,6,10,14,18];

function isFingerOpen(lm,tip,pip){
  const w=lm[0];
  return Math.hypot(lm[tip].x-w.x,lm[tip].y-w.y) >
         Math.hypot(lm[pip].x-w.x,lm[pip].y-w.y)*1.1;
}

function classifyHand(lm){
  let open=0;
  for(let i=1;i<=4;i++) if(isFingerOpen(lm,TIPS[i],PIPS[i])) open++;
  if(Math.hypot(lm[4].x-lm[5].x,lm[4].y-lm[5].y)>
     Math.hypot(lm[3].x-lm[5].x,lm[3].y-lm[5].y)) open++;
  if(open>=4) return 'open';
  if(open<=1) return 'fist';
  return 'mid';
}

let prevG='mid', stableC=0;

function onGesture(g){
  if(g===prevG){
    stableC++;
    if(stableC===3){
      if(g==='fist'){pop(wFist,'#ff3d7f');gestEl.textContent='✊  척!';gestEl.className='fist';}
      else if(g==='open'){pop(wOpen,'#00d4ff');gestEl.textContent='🖐  츄!';gestEl.className='open';}
      else{gestEl.textContent='...';gestEl.className='';}
    }
  } else { prevG=g; stableC=0; }
}

function onResults(results){
  canvas.width =video.videoWidth ||canvas.offsetWidth;
  canvas.height=video.videoHeight||canvas.offsetHeight;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(results.multiHandLandmarks&&results.multiHandLandmarks.length>0){
    const lm=results.multiHandLandmarks[0];
    drawConnectors(ctx,lm,HAND_CONNECTIONS,{color:'rgba(255,255,255,0.25)',lineWidth:2});
    drawLandmarks(ctx,lm,{color:'rgba(255,255,255,0.6)',lineWidth:1,radius:3});
    onGesture(classifyHand(lm));
  } else {
    gestEl.textContent='NO HAND — 손을 화면에';
    gestEl.className='';
    stableC=0;
  }
}

// ── START ───────────────────────────────────────────────
async function go(){
  document.getElementById('btn').style.display='none';
  setP(10,'카메라 초기화...');

  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}},audio:false
    });
    video.srcObject=stream;
    await new Promise(r=>{video.onloadedmetadata=r;});
    video.play();

    setP(40,'MediaPipe Hands 로딩 중...\n(첫 로딩 10~20초)');

    const hands=new Hands({
      locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
    });
    hands.setOptions({maxNumHands:1,modelComplexity:1,minDetectionConfidence:0.6,minTrackingConfidence:0.5});
    hands.onResults(onResults);

    setP(70,'모델 초기화 중...');

    const cam=new Camera(video,{
      onFrame:async()=>{await hands.send({image:video});},
      width:1280,height:720
    });
    await cam.start();

    setP(100,'✓ 준비 완료!');
    await new Promise(r=>setTimeout(r,400));

    document.getElementById('ss').style.display='none';

    // 미니 플레이어 표시 (이미 무음 자동재생 중)
    ytWrap.style.display='block';

    gestEl.textContent='손을 화면에 보여주세요';

  } catch(e){
    setP(0,'❌ '+e.message);
    document.getElementById('btn').style.display='block';
    console.error(e);
  }
}
</script>
</body>
</html>
